<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Login - MediSeba</title>
    <meta name="description" content="Patient login for booking appointments, payments, and prescriptions in MediSeba.">
    <link rel="stylesheet" href="../css/style.css?v=20260416-2">
    <link rel="stylesheet" href="../css/responsive.css?v=20260416-2">
    <link rel="stylesheet" href="../css/auth.css?v=20260416-2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)), url('../images/Background-photos/indexbackground.jpg') center/cover no-repeat fixed !important;
            position: relative;
            padding: 2rem;
        }
        
        .auth-image {
            display: none !important;
        }

        .auth-form-container {
            width: 100%;
            display: flex;
            justify-content: center;
            background: transparent !important;
        }

        .auth-form-wrapper {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(16px) !important;
            -webkit-backdrop-filter: blur(16px) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37) !important;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            text-decoration: none;
        }

        .auth-logo img {
            width: 32px;
            height: 32px;
        }
        
        .logo-wordmark {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .logo-wordmark-primary { color: var(--text-primary); }
        .logo-wordmark-secondary { color: var(--primary); }
        
        body.dark-mode .logo-wordmark-primary { color: #fff; }

        .auth-step h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .auth-subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group-icon {
            position: absolute;
            left: 1rem;
            color: var(--text-tertiary);
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-primary);
            background-color: var(--bg-surface);
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .form-error {
            display: block;
            color: var(--danger);
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .form-error.hidden {
            display: none;
        }

        .btn-primary {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.5rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            margin-top: 2rem;
        }

        .auth-alt {
            margin-top: 2rem;
            text-align: center;
            color: var(--text-secondary);
        }

        .auth-alt a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .auth-alt a:hover {
            text-decoration: underline;
        }

        .auth-divider {
            position: relative;
            text-align: center;
            margin: 2rem 0;
        }
        
        .auth-divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background-color: var(--border-color);
            z-index: 0;
        }
        
        .auth-divider span {
            position: relative;
            background-color: var(--bg-body);
            padding: 0 1rem;
            color: var(--text-tertiary);
            font-size: 0.875rem;
            z-index: 1;
        }

        .auth-image-content h2 {
            display: none;
        }

        .auth-image-content p {
            display: none;
        }
        
        /* Make form elements more bright and legible on the dark glass background */
        .auth-step h1 {
            color: #fff !important;
            text-align: center;
        }
        .auth-subtitle {
            color: rgba(255, 255, 255, 0.8) !important;
            text-align: center;
        }
        .form-label {
            color: rgba(255, 255, 255, 0.9) !important;
        }
        .form-input {
            background-color: rgba(255, 255, 255, 0.05) !important;
            color: #fff !important;
            border-color: rgba(255, 255, 255, 0.2) !important;
        }
        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .auth-divider span {
            background-color: transparent !important;
            color: rgba(255, 255, 255, 0.6) !important;
        }
        .auth-divider::before {
            background-color: rgba(255, 255, 255, 0.2) !important;
        }
        .auth-alt {
            color: rgba(255, 255, 255, 0.7) !important;
        }
        .auth-alt a {
            color: #fff !important;
        }
        .btn-outline {
            color: #fff !important;
            border-color: rgba(255, 255, 255, 0.3) !important;
            background: rgba(255, 255, 255, 0.1) !important;
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.2) !important;
        }
        .input-group-icon {
            color: rgba(255, 255, 255, 0.5) !important;
        }
        .logo-wordmark-primary { color: #fff !important; }
    </style>
</head>
<body class="auth-page auth-page-patient">
    <div class="auth-container">
        <!-- Auth Image Side -->
        <div class="auth-image">
            <div class="auth-image-content">
                <h2>Welcome Back!</h2>
                <p>Log in to manage your appointments, prescriptions, and follow-ups securely.</p>
            </div>
        </div>
        
        <!-- Auth Form Side -->
        <div class="auth-form-container">
            <div class="auth-form-wrapper">
                <a href="../index.html" class="auth-logo" aria-label="MediSeba home">
                    <img src="../images/logo-mark.svg" alt="" class="logo-mark">
                    <span class="logo-wordmark" aria-hidden="true"><span class="logo-wordmark-primary">Medi</span><span class="logo-wordmark-secondary">Seba</span></span>
                </a>
                
                <div class="auth-step">
                    <h1>Patient Sign In</h1>
                    <p class="auth-subtitle">Enter your email and password to access your patient dashboard.</p>
                    
                    <form id="loginForm" class="auth-form">
                        <div class="form-group">
                            <label for="email" class="form-label form-label-required">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-icon"><i class="fas fa-envelope"></i></span>
                                <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="password" class="form-label form-label-required">Password</label>
                            <div class="input-group">
                                <span class="input-group-icon"><i class="fas fa-lock"></i></span>
                                <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
                            </div>
                            <span class="form-error hidden" id="loginError"></span>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">
                            <span>Sign In</span>
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </form>
                    
                    <div class="auth-alt">
                        <p>Don't have an account? <a href="register.html">Sign up as a patient</a></p>
                    </div>

                    <div class="auth-divider">
                        <span>or login as</span>
                    </div>

                    <div class="auth-alt">
                        <a href="doctor-login.html" class="btn btn-outline" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                            <i class="fas fa-user-md"></i> Doctor
                        </a>
                        <a href="admin-login.html" class="btn btn-outline" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 0.5rem;">
                            <i class="fas fa-user-shield"></i> Admin
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="../js/api.js?v=20260416-2"></script>
    <script src="../js/auth.js?v=20260416-2"></script>
    <script src="../js/app.js?v=20260416-2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (Auth.isLoggedIn()) {
                window.location.href = Auth.getDashboardUrl();
                return;
            }

            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const errorElement = document.getElementById('loginError');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();
                
                errorElement.classList.add('hidden');
                
                // Show loading
                loginBtn.classList.add('is-loading');
                loginBtn.disabled = true;
                const originalText = loginBtn.innerHTML;
                loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
                
                try {
                    const result = await API.auth.login(email, password, 'patient');
                    
                    Auth.setToken(result.token);
                    Auth.setUser(result.user);
                    
                    showToast('Login successful!', 'success');
                    setTimeout(() => {
                        window.location.href = resolvePagePath('patient/dashboard.html');
                    }, 500);
                    
                } catch (error) {
                    errorElement.textContent = error.message || 'Invalid email or password';
                    errorElement.classList.remove('hidden');
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = originalText;
                    loginBtn.classList.remove('is-loading');
                }
            });
        });
    </script>
</body>
</html>
